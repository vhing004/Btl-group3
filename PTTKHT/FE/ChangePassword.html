<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Đổi mật khẩu</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="login-container">
  <img src="logo.png" class="logo">
  <h1 class="title">Đổi mật khẩu</h1>

  <form id="changeForm">
    <div class="input-group">
      <label>Mật khẩu cũ:</label>
      <input type="password" id="oldPass" placeholder="Nhập mật khẩu cũ">
    </div>

    <div class="input-group">
      <label>Mật khẩu mới:</label>
      <input type="password" id="newPass" placeholder="Nhập mật khẩu mới">
    </div>

    <div class="input-group">
      <label>Xác nhận mật khẩu mới:</label>
      <input type="password" id="confirmPass" placeholder="Nhập lại mật khẩu">
    </div>

    <div class="actions">
      <button type="submit">Đổi mật khẩu</button>
      <a href="Login.html" class="link">Quay lại đăng nhập</a>
    </div>
  </form>
</div>

</body>
</html>
